---

services:
  # clickhouse は公式
  # https://hub.docker.com/_/clickhouse
  # クライアント用に利用
  ch:
    image: clickhouse:25.12.1
    entrypoint: ''
  # alpのDocker imageは公式配布がないため、自作
  alp:
    build:
      context: ./dockerfiles/
      dockerfile: Dockerfile.alp
    working_dir: /works/
    volumes:
      - type: bind
        source: ${PWD}/
        target: /works/
  # docker: percona/percona-toolkit は公式
  # https://hub.docker.com/r/percona/percona-toolkit
  pt:
    image: percona/percona-toolkit:3.7.1
    working_dir: /works/
    volumes:
      - type: bind
        source: ${PWD}/
        target: /works/
