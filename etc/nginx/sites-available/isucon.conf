server {
  listen 80;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # 静的ファイルをNginxから配信
  location ~ ^/(favicon\.ico|css/|js/|img/) {
    expires 80s;
  }

  # 画像ファイルをNginxから配信
  location /image/ {
    expires 80s;
  }

  location / {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }
}
